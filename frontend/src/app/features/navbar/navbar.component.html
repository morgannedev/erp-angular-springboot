<header class="top-header">

  <!-- Título del módulo activo -->
  <div class="header-title">
    <h2 class="module-title">{{ currentTitle }}</h2>
  </div>

  <!-- Controles de la derecha -->
  <div class="header-controls">

    <!-- Notificaciones (placeholder funcional) -->
    <button class="header-icon-btn" aria-label="Notificaciones" title="Notificaciones">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
      </svg>
    </button>

    <!-- Divider -->
    <span class="header-divider"></span>

    <!-- Perfil de usuario -->
    <div class="header-profile">
      <div class="profile-avatar">
        {{ username.charAt(0).toUpperCase() }}
      </div>
      <div class="profile-info">
        <span class="profile-name">{{ username }}</span>
        <span class="profile-role">{{ role }}</span>
      </div>
    </div>

    <!-- Logout -->
    <button class="logout-btn" (click)="logout()" aria-label="Cerrar sesión" title="Cerrar sesión">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      <span>Salir</span>
    </button>

  </div>

</header>
